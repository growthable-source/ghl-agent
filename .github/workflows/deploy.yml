name: Deploy to Vercel (production)

# Auto-deploy every push to main to Vercel production. This replaces the
# native GitHub→Vercel integration, which stopped triggering builds (the
# project is still "connected" in Vercel but no longer fires on push).
# Runs the standard Vercel CLI flow: pull settings+env, build, deploy
# prebuilt. Needs three repo secrets: VERCEL_TOKEN (create one at
# vercel.com → Account Settings → Tokens), VERCEL_ORG_ID, VERCEL_PROJECT_ID.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Cancel an in-flight deploy when a newer push lands.
concurrency:
  group: vercel-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings + production env
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build (production)
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
